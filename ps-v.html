<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS | AUDIO HUD 📎</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="hud-container">
  <!-- HEADER -->
  <header class="hud-panel p-header">
    <div class="brand">
      <h1>PS VISUALIZER</h1>
      <span class="badge">SYS.HUD_CORE</span>
    </div>
    <div class="controls">
      <span id="fileName" class="readout">[ WAITING_FOR_DATA ]</span>
      <div class="file-wrap">
        <button class="btn">INJECT_DATA</button>
        <input type="file" id="fileInput" accept="audio/*" multiple>
      </div>
      <button class="btn" id="prevBtn">|<</button>
      <button class="btn accent" id="playBtn">EXECUTE</button>
      <button class="btn" id="nextBtn">>|</button>
      <div id="timeDisplay" class="readout highlight">00:00 / 00:00</div>
    </div>
  </header>

  <!-- MAIN VISUALIZER -->
  <main class="hud-panel p-main">
    <div class="tabs">
      <button class="tab active" data-view="spectrum">SPECTRUM</button>
      <button class="tab" data-view="waveform">WAVEFORM</button>
      <button class="tab" data-view="radial">RADIAL</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="slider-wrap">
      <input type="range" id="progressSlider" min="0" max="1000" value="0">
    </div>
  </main>

  <!-- METERS -->
  <aside class="hud-panel p-meters">
    <span class="hud-title">MASTER_OUT</span>
    <div class="meter-block">
      <div class="meter-col">
        <span class="lbl">L</span>
        <div class="meter-bg"><canvas id="chLCanvas"></canvas></div>
        <span class="val" id="chLVal">-INF</span>
      </div>
      <div class="meter-col">
        <span class="lbl">R</span>
        <div class="meter-bg"><canvas id="chRCanvas"></canvas></div>
        <span class="val" id="chRVal">-INF</span>
      </div>
    </div>
    <div class="metrics-grid">
      <div class="metric"><span class="k">PEAK</span><span class="v" id="peakLR">-INF</span></div>
      <div class="metric"><span class="k">RMS</span><span class="v" id="rmsLR">-INF</span></div>
      <div class="metric"><span class="k">LUFS</span><span class="v" id="lufsInt">--</span></div>
    </div>
  </aside>

  <!-- GONIOMETER & SPATIAL -->
  <div class="hud-panel p-spatial">
    <span class="hud-title">VECTOR_SCOPE</span>
    <div class="canvas-wrap goniometer">
      <canvas id="stereoRadar"></canvas>
    </div>
    <div class="metrics-grid mt-2">
      <div class="metric"><span class="k">PHASE</span><span class="v" id="corrVal">0.00</span></div>
      <div class="metric"><span class="k">WIDTH</span><span class="v" id="widthVal">0%</span></div>
    </div>
  </div>

  <!-- PLAYLIST & CONFIG -->
  <div class="hud-panel p-queue">
    <div class="queue-header">
      <span class="hud-title">DATA_QUEUE</span>
      <span class="lbl" id="queueCount">0_FILES</span>
    </div>
    <div class="playlist" id="playlistContainer">
      <div class="empty">[ NO_ROUTING ]</div>
    </div>
    
    <div class="config-grid mt-2">
      <div class="metric">
        <span class="k">UI_GLOW</span>
        <input type="color" id="accentPicker" value="#d6ff00">
      </div>
      <div class="metric">
        <span class="k">VOLUME</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
      </div>
    </div>
  </div>
</div>

<script src="js/engine.js"></script>
</body>
</html>
